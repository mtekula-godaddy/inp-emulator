# Inputer Performance Monitor - AWS Configuration

app:
  name: "inputer-performance-monitor"
  version: "1.0.0"
  host: "0.0.0.0"
  port: 8000

mcp_server:
  port: 3001
  executable_path: "/usr/bin/chromium"  # Amazon Linux 2 path
  headless: true
  disable_gpu: true
  no_sandbox: true
  timeout: 30000

llm_agent:
  # Using AWS Bedrock instead of local LLM
  provider: "bedrock"
  url: "https://bedrock-runtime.{region}.amazonaws.com"
  model: "anthropic.claude-3-haiku-20240307-v1:0"  # Fast and cost-effective
  temperature: 0.3
  max_tokens: 1000
  timeout: 30

performance:
  max_interactions_per_page: 15  # Slightly higher for cloud resources
  interaction_delay_min: 300     # Faster for cloud deployment
  interaction_delay_max: 1500
  page_load_timeout: 45000       # Longer timeout for network latency
  element_discovery_timeout: 8000
  screenshot_capture: true

data:
  output_dir: "/tmp/inputer-data"  # EFS mount point in production
  storage_backend: "s3"           # Use S3 for persistent storage
  s3_bucket: "${RESULTS_BUCKET}"  # From environment variable
  report_formats: ["json", "csv", "html"]
  retention_days: 30

logging:
  level: "INFO"
  format: "json"  # Better for CloudWatch
  enable_metrics: true
  metrics_port: 9090
  cloudwatch_log_group: "/ecs/inputer"

# AWS-specific configurations
aws:
  region: "${AWS_DEFAULT_REGION}"

  # Bedrock configuration
  bedrock:
    region: "${AWS_DEFAULT_REGION}"
    models:
      primary: "anthropic.claude-3-haiku-20240307-v1:0"
      fallback: "anthropic.claude-instant-v1"

  # S3 configuration
  s3:
    results_bucket: "${RESULTS_BUCKET}"
    prefix: "results"
    encryption: "AES256"

  # CloudWatch configuration
  cloudwatch:
    namespace: "Inputer/Performance"
    log_group: "/ecs/inputer"

  # ECS configuration
  ecs:
    cluster_name: "${ECS_CLUSTER_NAME}"
    service_name: "${ECS_SERVICE_NAME}"

# Monitoring and alerting
monitoring:
  enable_xray: true  # AWS X-Ray tracing
  custom_metrics:
    - name: "inp_score"
      type: "histogram"
    - name: "interactions_total"
      type: "counter"
    - name: "analysis_duration"
      type: "histogram"

  # CloudWatch alarms
  alarms:
    high_inp_threshold: 500  # Alert if INP > 500ms
    error_rate_threshold: 0.1  # Alert if error rate > 10%
    memory_threshold: 80  # Alert if memory > 80%