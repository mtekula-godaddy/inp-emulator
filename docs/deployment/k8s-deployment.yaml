# Kubernetes deployment for Inputer Performance Monitor

apiVersion: apps/v1
kind: Deployment
metadata:
  name: inputer-monitor
  labels:
    app: inputer-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inputer-monitor
  template:
    metadata:
      labels:
        app: inputer-monitor
    spec:
      containers:
      - name: inputer-monitor
        image: inputer-performance-monitor:latest
        ports:
        - containerPort: 8000
        - containerPort: 3001
        - containerPort: 9090
        env:
        - name: APP_NAME
          value: "inputer-performance-monitor"
        - name: HOST
          value: "0.0.0.0"
        - name: PORT
          value: "8000"
        - name: MCP_SERVER_PORT
          value: "3001"
        - name: LLM_AGENT_URL
          value: "http://ollama-service:11434"
        - name: CHROME_HEADLESS
          value: "true"
        - name: CHROME_DISABLE_GPU
          value: "true"
        - name: CHROME_NO_SANDBOX
          value: "true"
        volumeMounts:
        - name: data-volume
          mountPath: /app/data
        - name: config-volume
          mountPath: /app/config
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: data-volume
        persistentVolumeClaim:
          claimName: inputer-data-pvc
      - name: config-volume
        configMap:
          name: inputer-config

---
apiVersion: v1
kind: Service
metadata:
  name: inputer-monitor-service
spec:
  selector:
    app: inputer-monitor
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  - name: mcp
    port: 3001
    targetPort: 3001
  - name: metrics
    port: 9090
    targetPort: 9090
  type: ClusterIP

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: inputer-data-pvc
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: inputer-config
data:
  config.yaml: |
    app:
      name: "inputer-performance-monitor"
      version: "1.0.0"
      host: "0.0.0.0"
      port: 8000

    mcp_server:
      port: 3001
      headless: true
      disable_gpu: true
      no_sandbox: true

    llm_agent:
      url: "http://ollama-service:11434"
      model: "llama2"
      temperature: 0.3

    performance:
      max_interactions_per_page: 10
      interaction_delay_min: 500
      interaction_delay_max: 2000
      screenshot_capture: true

    data:
      output_dir: "/app/data"
      report_formats: ["json", "csv", "html"]

    logging:
      level: "INFO"
      format: "json"
      enable_metrics: true

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  labels:
    app: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
      - name: ollama
        image: ollama/ollama:latest
        ports:
        - containerPort: 11434
        volumeMounts:
        - name: ollama-data
          mountPath: /root/.ollama
        resources:
          requests:
            memory: "4Gi"
            cpu: "2000m"
          limits:
            memory: "8Gi"
            cpu: "4000m"
      volumes:
      - name: ollama-data
        persistentVolumeClaim:
          claimName: ollama-data-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: ollama-service
spec:
  selector:
    app: ollama
  ports:
  - port: 11434
    targetPort: 11434
  type: ClusterIP

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-data-pvc
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi