AWSTemplateFormatVersion: '2010-09-09'
Description: 'Inputer Performance Monitor - AWS Infrastructure'

Parameters:
  Environment:
    Type: String
    Default: 'dev'
    AllowedValues: ['dev', 'staging', 'prod']
    Description: 'Environment name'

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: 'VPC ID for deployment'

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: 'Subnet IDs for ECS tasks'

  LLMModelName:
    Type: String
    Default: 'llama2'
    Description: 'LLM model to use'

Resources:
  # ECS Cluster
  InputerCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub 'inputer-${Environment}'
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1
        - CapacityProvider: FARGATE_SPOT
          Weight: 4
      ClusterSettings:
        - Name: containerInsights
          Value: enabled

  # IAM Role for ECS Tasks
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'

  # Task Role
  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource:
                  - !Sub '${ResultsBucket}/*'
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:ListModels
                Resource: '*'

  # S3 Bucket for Results
  ResultsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'inputer-results-${Environment}-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldResults
            Status: Enabled
            ExpirationInDays: 30
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # CloudWatch Log Group
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/inputer-${Environment}'
      RetentionInDays: 30

  # Security Group
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Security group for Inputer Performance Monitor'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          CidrIp: 10.0.0.0/8
        - IpProtocol: tcp
          FromPort: 3001
          ToPort: 3001
          CidrIp: 10.0.0.0/8

  # ECS Task Definition
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub 'inputer-${Environment}'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: 2048
      Memory: 4096
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: inputer-monitor
          Image: public.ecr.aws/lambda/python:3.11
          Essential: true
          Memory: 3072
          Cpu: 1536
          PortMappings:
            - ContainerPort: 8000
              Protocol: tcp
            - ContainerPort: 3001
              Protocol: tcp
          Environment:
            - Name: APP_NAME
              Value: inputer-performance-monitor
            - Name: ENVIRONMENT
              Value: !Ref Environment
            - Name: AWS_DEFAULT_REGION
              Value: !Ref AWS::Region
            - Name: RESULTS_BUCKET
              Value: !Ref ResultsBucket
            - Name: LLM_MODEL
              Value: !Ref LLMModelName
            - Name: CHROME_HEADLESS
              Value: 'true'
            - Name: CHROME_DISABLE_GPU
              Value: 'true'
            - Name: CHROME_NO_SANDBOX
              Value: 'true'
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: inputer
          Command:
            - /bin/bash
            - -c
            - |
              yum update -y
              yum install -y nodejs npm chromium
              cd /var/task
              python -m pip install -r requirements.txt
              npm install
              python src/python/main.py --config-file config/aws.yaml

  # Application Load Balancer
  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub 'inputer-${Environment}'
      Scheme: internal
      Type: application
      Subnets: !Ref SubnetIds
      SecurityGroups:
        - !Ref SecurityGroup

  # Target Group
  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub 'inputer-${Environment}'
      Port: 8000
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref VpcId
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  # Load Balancer Listener
  LoadBalancerListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP

  # ECS Service
  Service:
    Type: AWS::ECS::Service
    DependsOn: LoadBalancerListener
    Properties:
      ServiceName: !Sub 'inputer-${Environment}'
      Cluster: !Ref InputerCluster
      TaskDefinition: !Ref TaskDefinition
      LaunchType: FARGATE
      DesiredCount: 1
      NetworkConfiguration:
        AwsvpcConfiguration:
          SecurityGroups:
            - !Ref SecurityGroup
          Subnets: !Ref SubnetIds
          AssignPublicIp: ENABLED
      LoadBalancers:
        - ContainerName: inputer-monitor
          ContainerPort: 8000
          TargetGroupArn: !Ref TargetGroup

  # Lambda Function for Scheduled Analysis
  ScheduledAnalysisFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'inputer-scheduled-${Environment}'
      Runtime: python3.11
      Handler: lambda_handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 900
      Environment:
        Variables:
          ECS_CLUSTER: !Ref InputerCluster
          ECS_SERVICE: !Ref Service
          TASK_DEFINITION: !Ref TaskDefinition
          RESULTS_BUCKET: !Ref ResultsBucket
      Code:
        ZipFile: |
          import json
          import boto3
          import os

          def lambda_handler(event, context):
              ecs = boto3.client('ecs')

              # Parse URLs from event
              urls = event.get('urls', [])
              if not urls:
                  return {
                      'statusCode': 400,
                      'body': json.dumps({'error': 'No URLs provided'})
                  }

              # Run ECS task
              response = ecs.run_task(
                  cluster=os.environ['ECS_CLUSTER'],
                  taskDefinition=os.environ['TASK_DEFINITION'],
                  launchType='FARGATE',
                  networkConfiguration={
                      'awsvpcConfiguration': {
                          'subnets': event.get('subnets', []),
                          'assignPublicIp': 'ENABLED'
                      }
                  },
                  overrides={
                      'containerOverrides': [
                          {
                              'name': 'inputer-monitor',
                              'command': [
                                  'python', 'src/python/main.py',
                                  '--urls'] + urls
                          }
                      ]
                  }
              )

              return {
                  'statusCode': 200,
                  'body': json.dumps({
                      'taskArn': response['tasks'][0]['taskArn'],
                      'message': 'Analysis started successfully'
                  })
              }

  # Lambda Execution Role
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ECSAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ecs:RunTask
                  - ecs:DescribeTasks
                  - iam:PassRole
                Resource: '*'

  # EventBridge Rule for Scheduled Analysis
  ScheduledAnalysisRule:
    Type: AWS::Events::Rule
    Properties:
      Description: 'Scheduled Inputer performance analysis'
      ScheduleExpression: 'cron(0 9 * * MON)'  # Every Monday at 9 AM
      State: ENABLED
      Targets:
        - Arn: !GetAtt ScheduledAnalysisFunction.Arn
          Id: 'ScheduledAnalysisTarget'
          Input: !Sub |
            {
              "urls": ["https://example.com"],
              "subnets": ${SubnetIds}
            }

  # Permission for EventBridge to invoke Lambda
  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ScheduledAnalysisFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ScheduledAnalysisRule.Arn

  # CloudWatch Dashboard
  Dashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub 'Inputer-${Environment}'
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  ["AWS/ECS", "CPUUtilization", "ServiceName", "${Service}", "ClusterName", "${InputerCluster}"],
                  [".", "MemoryUtilization", ".", ".", ".", "."]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "title": "ECS Resource Utilization",
                "period": 300
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${LogGroup}'\n| fields @timestamp, @message\n| filter @message like /ERROR/\n| sort @timestamp desc\n| limit 20",
                "region": "${AWS::Region}",
                "title": "Recent Errors"
              }
            }
          ]
        }

Outputs:
  ClusterName:
    Description: 'ECS Cluster Name'
    Value: !Ref InputerCluster
    Export:
      Name: !Sub '${AWS::StackName}-ClusterName'

  ServiceName:
    Description: 'ECS Service Name'
    Value: !Ref Service
    Export:
      Name: !Sub '${AWS::StackName}-ServiceName'

  LoadBalancerDNS:
    Description: 'Load Balancer DNS Name'
    Value: !GetAtt LoadBalancer.DNSName
    Export:
      Name: !Sub '${AWS::StackName}-LoadBalancerDNS'

  ResultsBucket:
    Description: 'S3 Bucket for Results'
    Value: !Ref ResultsBucket
    Export:
      Name: !Sub '${AWS::StackName}-ResultsBucket'

  LambdaFunctionArn:
    Description: 'Lambda Function ARN for Scheduled Analysis'
    Value: !GetAtt ScheduledAnalysisFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-LambdaFunctionArn'