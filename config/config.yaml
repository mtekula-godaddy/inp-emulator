# Inputer Performance Monitor Configuration

# Browser/Chrome settings
browser:
  port: 3001
  executable_path: null  # Will use system Chrome
  headless: false  # GoDaddy blocks headless mode even with anti-detection
  disable_gpu: true
  no_sandbox: true
  timeout: 30000
  mobile_emulation: true  # Enable mobile emulation (Pixel 5)
  network_throttling: "Fast 4G"  # Realistic mobile network conditions

performance:
  max_interactions_per_page: 10
  interaction_delay_min: 500
  interaction_delay_max: 2000
  page_load_timeout: 30000
  element_discovery_timeout: 5000
  screenshot_capture: true
  video_capture: true  # Record video of each test session
  # Realistic interaction timing (milliseconds after element becomes visible)
  interaction_timing:
    high_priority: [1000, 3000]    # Hamburger menu, primary CTA: 1-3s
    medium_priority: [2000, 5000]  # Secondary buttons, forms: 2-5s
    low_priority: [4000, 8000]     # Footer links, tertiary actions: 4-8s
  # Start interactions before full page load (realistic user behavior)
  start_interactions_early: true
  min_wait_before_first_interaction: 2000  # Wait at least 2s after navigation starts

data:
  output_dir: "./data"
  report_formats: ["json", "csv", "html"]
  retention_days: 30

logging:
  level: "INFO"
  format: "json"